<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Current Weather</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="./css/styles.css">
</head>

<body class="bg-light">

    <header class="bg-primary text-white py-4">
        <div class="container">

            <h1 class="text-center">
                Current Weather
            </h1>

        </div>
    </header>

    <main class="container my-5">

        <current-weather></current-weather>

    </main>

    <script
        type="module"
        src="./js/app.js"
    ></script>

<template id="weather-card-template">

    <style>

        :host {
            display: block;
        }

        .card {
            max-width: 900px;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .result {
            margin-top: 2rem;
        }

    </style>

    <div class="card shadow">

        <div class="card-body">

            <h2>
                Current Weather
            </h2>

            <div class="row">

                <div class="col-md-6">

                    <div class="border rounded p-3 h-100">

                        <h4 class="mb-3">
                             Current Location
                        </h4>

                        <p>
                            Get the weather using your current location.
                        </p>

                        <button
                            class="btn btn-primary w-100 location-button"
                        >
                            Use My Location
                        </button>

                    </div>

                </div>


                <div class="col-md-6">

                    <div class="border rounded p-3 h-100">

                        <h4 class="mb-3">
                             Manual Coordinates
                        </h4>

                        <div class="mb-3">

                            <label class="form-label">
                                Latitude
                            </label>

                            <input
                                class="form-control latitude"
                                type="number"
                                step="any"
                                placeholder="45.5088"
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Longitude
                            </label>

                            <input
                                class="form-control longitude"
                                type="number"
                                step="any"
                                placeholder="-73.5878"
                            >

                        </div>

                        <button
                            class="btn btn-success w-100 coordinate-button"
                        >
                            Get Weather
                        </button>

                    </div>

                </div>

            </div>


            <hr>


            <div class="result">

                <h4>
                    Weather Result
                </h4>

                <p class="temperature">
                    Temperature:
                </p>

                <p class="windspeed">
                    Wind Speed:
                </p>

                <p class="winddirection">
                    Wind Direction:
                </p>

                <p class="weathercode">
                    Weather Code:
                </p>

                <p
                    class="status text-primary fw-bold"
                >
                </p>

            </div>

        </div>

    </div>

</template>

</body>
</html>
