<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>User Information Display</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
</head>

<body class="bg-light">

    <div class="container py-5">

        <h1 class="text-center mb-3">User Information Loader</h1>

        <p class="text-center text-muted mb-4">
            Button Click to load user data using fetch(). Then, you can clear the display using the Clear button.
        </p>

        <div class="text-center mb-4">
            <button id="loadBtn" class="btn btn-success me-2 px-4">
                Load User
            </button>

            <button id="clearBtn" class="btn btn-danger px-4">
                Clear Display
            </button>
        </div>

        <div id="messageArea" class="w-50 mx-auto"></div>

        <div id="userContainer" class="mt-4"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
