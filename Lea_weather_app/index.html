<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Current Weather - Muhammad Zafar</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="./css/styles.css"
    >
</head>

<body class="bg-light">

    <header class="bg-primary text-white py-4">
        <div class="container">

            <h1 class="text-center">
                Current Weather
            </h1>

        </div>
    </header>

    <main class="container my-5">

        <current-weather></current-weather>

    </main>

    <script
        type="module"
        src="./js/app.js"
    ></script>

    <template id="weather-card-template">

    <style>

        :host {
            display: block;
        }

        .card {
            max-width: 500px;
            margin: auto;
        }

    </style>

    <div class="card shadow">

        <div class="card-body">

            <h2 class="card-title">
                Current Weather
            </h2>

            <p class="temperature"></p>

            <p class="windspeed"></p>

            <p class="winddirection"></p>

            <p class="weathercode"></p>

            <p class="status"></p>

        </div>

    </div>

</template>

</body>
</html>
