<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Festival Lineup Guide by Muhammad Zafar

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container my-5">

        <div class="text-center mb-5">

            <h1 class="display-4 fw-bold text-success">

                Festival Lineup Guide

            </h1>

            <p class="lead">

                Browse festival artists and explore the event lineup

            </p>

        </div>

        <div class="text-center mb-4">

            <button
                id="loadBtn"
                class="btn btn-success btn-lg me-2">

                Load Lineup

            </button>

            <button
                id="clearBtn"
                class="btn btn-outline-danger btn-lg">

                Clear

            </button>

        </div>

        <div id="messageArea">

            <div class="alert alert-secondary text-center">

                Click "Load Lineup" to begin.

            </div>

        </div>

        <hr class="my-4">

        <section>

            <h2 class="text-center mb-3">

                Festival Artists

            </h2>

            <div
                id="artistsContainer"
                class="row">

                <div class="col-12 text-center">

                    <p class="text-muted">

                        No artists loaded.

                    </p>

                </div>

            </div>

        </section>

        <hr class="my-5">

        <section>

            <h2 class="text-center mb-3">

                Artist Details

            </h2>

            <div id="detailsContainer">

                <div class="alert alert-light text-center">

                    No artist selected.

                </div>

            </div>

        </section>

    </div>

    <!-- ========================= -->
    <!-- Artist Card Template -->
    <!-- ========================= -->

    <template id="artist-template">

        <style>

            .artist-card{

                background:white;

                border:1px solid #ccc;

                border-radius:10px;

                padding:20px;

                box-shadow:0 2px 5px rgba(0,0,0,.15);

            }

            h3{

                color:#198754;

            }

            button{

                margin-top:10px;

            }

        </style>

        <div class="artist-card">

            <h3 class="artist-name">

                Artist

            </h3>

            <p
                class="headliner-badge"
                style="
                    display:none;
                    color:#b8860b;
                    font-weight:bold;
                    margin-bottom:8px;
                ">

                  Headliner

            </p>

            <p class="artist-genre">

                Genre

            </p>

            <p class="artist-stage">

                Stage

            </p>

            <button
                class="btn btn-success detailsBtn">

                View Details

            </button>

        </div>

    </template>

    <script
        type="module"
        src="./app.js">

    </script>

</body>

</html>
