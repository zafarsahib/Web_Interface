<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Loader</title>

    <!-- minimal CSS -->
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }

      button {
        padding: 8px 12px;
        margin: 10px 0;
      }

      section {
        border: 1px solid #ccc;
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <main>
      <!-- heading -->
      <h1>Post Viewer</h1>

      <!-- short description -->
      <p>Click the button to load a post.</p>

      <!-- button -->
      <button id="load-post-btn">Load Post</button>

      <!-- status paragraph -->
      <p id="status">Status: Idle</p>

      <!-- content section with placeholder text -->
      <section id="post-content">
        <h2>Post Content</h2>
        <p>This is placeholder text. The post will appear here.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
