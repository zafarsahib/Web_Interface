<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        World Cup Dashboard - Muhammad Zafar
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container my-5">

        <div class="text-center mb-5">

            <h1 class="display-4 fw-bold text-primary">

                World Cup Dashboard

            </h1>

            <p class="lead">

                Browse World Cup teams and view tournament standings.

            </p>

        </div>

        <div class="text-center mb-4">

            <button
                id="loadBtn"
                class="btn btn-success btn-lg me-2">

                Load Teams

            </button>

            <button
                id="clearBtn"
                class="btn btn-outline-danger btn-lg">

                Clear Dashboard

            </button>

        </div>

        <div id="messageArea">

            <div class="alert alert-secondary text-center">

                Click the Load Teams button to display teams.

            </div>

        </div>

        <hr class="my-4">

        <section>

            <h2 class="text-center mb-3">

                Teams

            </h2>

            <div
                id="teamsContainer"
                class="row justify-content-center">

                <div class="col-12 text-center">

                    <p class="text-muted">

                        No teams loaded.

                    </p>

                </div>

            </div>

        </section>

        <hr class="my-5">

        <section>

            <h2 class="text-center mb-3">

                Selected Team

            </h2>

            <div id="detailsContainer">

                <div class="alert alert-light text-center">

                    No team selected yet.

                </div>

            </div>

        </section>

    </div>

    <script
        type="module"
        src="./app.js">
    </script>

</body>

</html>
